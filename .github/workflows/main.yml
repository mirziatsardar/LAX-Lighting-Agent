name: Build LAX EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 官方 PyPI 安装依赖（国外库）
        run: |
          pip install numpy pyaudio librosa sacn pyinstaller

      - name: 打包 EXE（强制收集所有音频库）
        run: |
          pyinstaller --onefile --noconsole `
            --hidden-import=pyaudio `
            --hidden-import=librosa `
            --hidden-import=sacn `
            --hidden-import=numpy `
            --collect-all pyaudio `
            --collect-all librosa `
            --collect-all sacn `
            --collect-all numpy `
            LAX_AI_Agent_Pro.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: LAX_AI_Agent_Pro_Windows_Version
          path: dist/LAX_AI_Agent_Pro.exe
