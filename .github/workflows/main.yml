name: Build Windows EXE

# 这个指令会在你上传代码，或者手动点击时触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # 召唤一台最新的微软 Windows 云服务器

    steps:
    - name: 获取代码
      uses: actions/checkout@v3
    
    - name: 安装 Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 3.10 兼容音频库最好
        
    - name: 安装环境和打包工具
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: 开始用 PyInstaller 打包
      # --onefile 打包成单文件，--windowed 隐藏黑色的命令行窗口
      run: |
        pyinstaller --onefile --windowed LAX_AI_Agent_Pro.py
        
    - name: 输出并保存 EXE 文件
      uses: actions/upload-artifact@v3
      with:
        name: LAX_AI_Agent_Pro_Windows_Version
        path: dist/LAX_AI_Agent_Pro.exe
