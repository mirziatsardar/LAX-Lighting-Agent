name: Build LAX EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 国内清华镜像安装依赖
        run: |
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple numpy pyaudio aubio sacn pyinstaller

      - name: 打包 EXE（强制收集所有音频 DLL）
        run: |
          pyinstaller --onefile --noconsole `
            --hidden-import=pyaudio `
            --hidden-import=aubio `
            --hidden-import=sacn `
            --hidden-import=numpy `
            --collect-all pyaudio `
            --collect-all aubio `
            --collect-all sacn `
            --collect-all numpy `
            LAX_Light_Engine_V3.0.py

      - name: 上传生成的 EXE
        uses: actions/upload-artifact@v4
        with:
          name: LAX_AI_Agent_Pro_Windows_Version
          path: dist/LAX_AI_Agent_Pro.exe
